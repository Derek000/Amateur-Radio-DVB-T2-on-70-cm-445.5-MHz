name: CI
on:
  pull_request:
  push:
    branches: [ main, master ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
      - name: Shellcheck
        run: shellcheck scripts/*.sh
      - name: YAML lint
        run: yamllint .
      - name: Show grcc version if present (non-fatal)
        continue-on-error: true
        run: grcc --version || true
